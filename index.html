
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>匹克球計分</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --navy: #0f2d5a;
    --blue: #1a4d8f;
    --accent: #e84c3d;
    --bg: #f0f4fa;
    --card: #ffffff;
    --text: #0f1c2e;
    --muted: #6b7f99;
    --border: #d0dbe8;
    --green: #1e8a5e;
  }

  body {
    font-family: -apple-system, "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--navy);
    color: #fff;
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
  .header-meta { font-size: 12px; color: #8baacf; }

  .meta-bar {
    background: var(--blue);
    color: #c8d9ef;
    font-size: 13px;
    padding: 8px 16px;
    display: flex;
    gap: 18px;
    align-items: center;
    flex-wrap: wrap;
  }
  .meta-bar select {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    font-size: 13px;
    border-radius: 6px;
    padding: 3px 6px;
    cursor: pointer;
  }

  main { padding: 12px 12px 100px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Game card ── */
  .game-card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
  }
  .game-header {
    background: var(--blue);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .game-badge {
    font-size: 11px;
    background: rgba(255,255,255,.18);
    border-radius: 20px;
    padding: 2px 10px;
  }

  /* ── Score row ── */
  .score-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
    min-height: 130px;
  }

  .team-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 8px 10px;
    gap: 6px;
    position: relative;
  }
  .team-block.serving::before {
    content: "🟡 發球";
    position: absolute;
    top: 6px;
    font-size: 10px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: .3px;
  }
  .team-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .3px;
    cursor: pointer;
    border-bottom: 1px dashed var(--border);
    padding: 1px 4px;
    text-align: center;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .big-score {
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    color: var(--navy);
    letter-spacing: -2px;
  }
  .team-block.winning .big-score { color: var(--green); }

  .score-btns { display: flex; gap: 8px; margin-top: 2px; }
  .btn-score {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s;
    -webkit-user-select: none; user-select: none;
  }
  .btn-score:active { transform: scale(.88); }
  .btn-plus { background: var(--navy); color: #fff; }
  .btn-minus { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

  .vs-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    gap: 6px;
  }
  .vs-text { font-size: 11px; color: var(--muted); font-weight: 600; }
  .colon { font-size: 36px; font-weight: 800; color: var(--border); line-height: 1; }

  /* ── Serve selector ── */
  .serve-row {
    border-top: 1px solid var(--bg);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .serve-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .serve-btns { display: flex; gap: 6px; flex: 1; }
  .btn-serve {
    flex: 1;
    padding: 6px 4px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .btn-serve.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Win banner ── */
  .win-banner {
    display: none;
    background: linear-gradient(90deg, #1e8a5e 0%, #27b57a 100%);
    color: #fff;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    padding: 10px;
    letter-spacing: .3px;
  }
  .win-banner.show { display: block; }

  /* ── Summary ── */
  .summary-card {
    background: var(--navy);
    border-radius: 16px;
    padding: 16px;
    color: #fff;
  }
  .summary-title { font-size: 13px; color: #8baacf; margin-bottom: 10px; font-weight: 600; }
  .summary-row { display: flex; justify-content: space-around; }
  .summary-team { text-align: center; }
  .summary-team-name { font-size: 12px; color: #8baacf; margin-bottom: 4px; }
  .summary-wins { font-size: 40px; font-weight: 800; color: #fff; }
  .summary-vs { font-size: 20px; color: #3a5a8a; align-self: center; font-weight: 700; }
  .match-winner {
    margin-top: 12px;
    background: var(--green);
    border-radius: 10px;
    padding: 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    display: none;
  }
  .match-winner.show { display: block; }

  /* ── Log ── */
  .log-card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
  }
  .log-head {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 1px solid var(--bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .log-clear { font-size: 11px; color: var(--accent); cursor: pointer; }
  .log-list { max-height: 180px; overflow-y: auto; }
  .log-item {
    display: flex;
    justify-content: space-between;
    padding: 7px 14px;
    font-size: 12px;
    border-bottom: 1px solid var(--bg);
    color: var(--text);
  }
  .log-item:last-child { border-bottom: none; }
  .log-item.highlight { color: var(--green); font-weight: 600; background: #f0faf5; }
  .log-time { color: var(--muted); font-size: 11px; }
  .log-empty { padding: 16px 14px; font-size: 12px; color: var(--muted); text-align: center; }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .btn-action {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .1s;
  }
  .btn-action:active { transform: scale(.96); }
  .btn-next { background: var(--navy); color: #fff; }
  .btn-reset { background: var(--bg); color: var(--accent); border: 1.5px solid var(--accent); }

  /* ── Name edit overlay ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .overlay-box {
    background: var(--card);
    border-radius: 20px;
    padding: 24px 20px;
    width: min(320px, 90vw);
  }
  .overlay-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--navy); }
  .overlay-input {
    width: 100%; padding: 12px; font-size: 18px; font-weight: 700;
    border: 2px solid var(--blue); border-radius: 10px; outline: none;
    color: var(--navy); text-align: center;
  }
  .overlay-btns { display: flex; gap: 10px; margin-top: 14px; }
  .overlay-btn {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .overlay-ok { background: var(--navy); color: #fff; }
  .overlay-cancel { background: var(--bg); color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>🏓 匹克球計分</h1>
  <span class="header-meta" id="matchStatus">進行中</span>
</header>

<div class="meta-bar">
  <span>制勝分：</span>
  <select id="winScore" onchange="checkAllWins()">
    <option value="11">11 分</option>
    <option value="15">15 分</option>
    <option value="21">21 分</option>
  </select>
  <span style="margin-left:8px">總局數：</span>
  <select id="totalGames">
    <option value="2" selected>2 局</option>
    <option value="3">3 局</option>
    <option value="5">5 局</option>
  </select>
</div>

<main id="gamesContainer"></main>

<div class="bottom-bar">
  <button class="btn-action btn-reset" onclick="confirmReset()">重置全場</button>
  <button class="btn-action btn-next" id="btnNext" onclick="nextGame()">下一局 →</button>
</div>

<!-- name edit overlay -->
<div class="overlay" id="nameOverlay">
  <div class="overlay-box">
    <div class="overlay-title" id="overlayTitle">修改隊名</div>
    <input class="overlay-input" id="overlayInput" maxlength="10" />
    <div class="overlay-btns">
      <button class="overlay-btn overlay-cancel" onclick="closeOverlay()">取消</button>
      <button class="overlay-btn overlay-ok" onclick="saveOverlay()">確認</button>
    </div>
  </div>
</div>

<script>
let names = ['隊伍 A', '隊伍 B'];
let games = []; // [{scores:[0,0], server:null, over:false}]
let gamesWon = [0, 0];
let currentGame = 0;
let log = [];
let editingTeam = null;
let editingGame = null;

function initGame() {
  games.push({ scores: [0, 0], server: null, over: false });
}

function winScore() { return parseInt(document.getElementById('winScore').value); }
function totalGames() { return parseInt(document.getElementById('totalGames').value); }

function render() {
  const container = document.getElementById('gamesContainer');
  container.innerHTML = '';

  games.forEach((g, gi) => {
    const card = document.createElement('div');
    card.className = 'game-card';

    const isWinner = [
      g.scores[0] >= winScore() && g.scores[0] - g.scores[1] >= 2,
      g.scores[1] >= winScore() && g.scores[1] - g.scores[0] >= 2
    ];
    const winner = isWinner[0] ? 0 : isWinner[1] ? 1 : null;

    card.innerHTML = `
      <div class="game-header">
        <span>第 ${gi+1} 局</span>
        <span class="game-badge">${g.over ? (winner !== null ? names[winner]+' 勝' : '完成') : '進行中'}</span>
      </div>
      ${winner !== null ? `<div class="win-banner show">🏆 ${names[winner]} 贏得本局！</div>` : ''}
      <div class="score-row">
        ${[0,1].map(t => `
          <div class="team-block ${g.server===t?'serving':''} ${(winner===t)?'winning':''}">
            <div class="team-name" onclick="editName(${t},${gi})">${names[t]}</div>
            <div class="big-score">${g.scores[t]}</div>
            <div class="score-btns">
              <button class="btn-score btn-minus" onclick="changeScore(${gi},${t},-1)" ${g.over?'disabled':''}>−</button>
              <button class="btn-score btn-plus" onclick="changeScore(${gi},${t},1)" ${g.over?'disabled':''}>+</button>
            </div>
          </div>
          ${t===0 ? '<div class="vs-col"><span class="vs-text">VS</span><span class="colon">:</span></div>' : ''}
        `).join('')}
      </div>
      <div class="serve-row">
        <span class="serve-label">發球</span>
        <div class="serve-btns">
          <button class="btn-serve ${g.server===0?'active':''}" onclick="setServer(${gi},0)" ${g.over?'disabled':''}>${names[0]}</button>
          <button class="btn-serve ${g.server===1?'active':''}" onclick="setServer(${gi},1)" ${g.over?'disabled':''}>${names[1]}</button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  // Summary
  const sum = document.createElement('div');
  sum.className = 'summary-card';
  const matchWinner = gamesWon[0] > gamesWon[1] && gamesWon[0] >= Math.ceil(totalGames()/2) ? 0
    : gamesWon[1] > gamesWon[0] && gamesWon[1] >= Math.ceil(totalGames()/2) ? 1 : null;
  sum.innerHTML = `
    <div class="summary-title">局數戰績</div>
    <div class="summary-row">
      <div class="summary-team">
        <div class="summary-team-name">${names[0]}</div>
        <div class="summary-wins">${gamesWon[0]}</div>
      </div>
      <div class="summary-vs">—</div>
      <div class="summary-team">
        <div class="summary-team-name">${names[1]}</div>
        <div class="summary-wins">${gamesWon[1]}</div>
      </div>
    </div>
    <div class="match-winner ${matchWinner!==null?'show':''}">
      🏆 ${matchWinner!==null?names[matchWinner]+' 贏得比賽！':''}
    </div>
  `;
  container.appendChild(sum);

  // Log
  const logCard = document.createElement('div');
  logCard.className = 'log-card';
  const logItems = log.length
    ? log.slice(0,30).map(e=>`
        <div class="log-item ${e.h?'highlight':''}">
          <span>${e.msg}</span>
          <span class="log-time">${e.t}</span>
        </div>`).join('')
    : '<div class="log-empty">尚無得分紀錄</div>';
  logCard.innerHTML = `
    <div class="log-head"><span>得分紀錄</span><span class="log-clear" onclick="clearLog()">清除</span></div>
    <div class="log-list">${logItems}</div>
  `;
  container.appendChild(logCard);

  // next btn
  const btnNext = document.getElementById('btnNext');
  const canNext = games.length < totalGames() && games[games.length-1].over;
  btnNext.disabled = !canNext;
  btnNext.style.opacity = canNext ? '1' : '.4';

  document.getElementById('matchStatus').textContent =
    matchWinner !== null ? names[matchWinner]+' 勝' : `第 ${games.length} 局`;
}

function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function addLog(msg, highlight=false) {
  log.unshift({ msg, h: highlight, t: now() });
}

function changeScore(gi, team, delta) {
  const g = games[gi];
  if (g.over) return;
  const nv = g.scores[team] + delta;
  if (nv < 0) return;
  g.scores[team] = nv;
  if (delta > 0) addLog(`${names[team]} 得分 → ${g.scores[0]} : ${g.scores[1]}`);
  checkWin(gi);
  render();
}

function checkWin(gi) {
  const g = games[gi];
  const ws = winScore();
  const won = [
    g.scores[0] >= ws && g.scores[0] - g.scores[1] >= 2,
    g.scores[1] >= ws && g.scores[1] - g.scores[0] >= 2
  ];
  if ((won[0] || won[1]) && !g.over) {
    g.over = true;
    const w = won[0] ? 0 : 1;
    gamesWon[w]++;
    addLog(`${names[w]} 贏得第 ${gi+1} 局！`, true);
  }
}

function checkAllWins() { games.forEach((_, i) => checkWin(i)); render(); }

function setServer(gi, team) {
  if (games[gi].over) return;
  games[gi].server = team;
  render();
}

function nextGame() {
  if (games.length >= totalGames()) return;
  if (!games[games.length-1].over) return;
  initGame();
  addLog(`--- 第 ${games.length} 局開始 ---`);
  render();
  setTimeout(() => {
    const cards = document.querySelectorAll('.game-card');
    cards[cards.length-1]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function confirmReset() {
  if (confirm('確定要重置全場嗎？')) resetAll();
}

function resetAll() {
  games = [];
  gamesWon = [0, 0];
  log = [];
  initGame();
  render();
}

function editName(team, gi) {
  editingTeam = team;
  editingGame = gi;
  document.getElementById('overlayTitle').textContent = `修改${team===0?'隊伍 A':'隊伍 B'}名稱`;
  document.getElementById('overlayInput').value = names[team];
  document.getElementById('nameOverlay').classList.add('show');
  setTimeout(() => document.getElementById('overlayInput').focus(), 100);
}

function saveOverlay() {
  const val = document.getElementById('overlayInput').value.trim();
  if (val) names[editingTeam] = val;
  closeOverlay();
  render();
}

function closeOverlay() {
  document.getElementById('nameOverlay').classList.remove('show');
}

function clearLog() { log = []; render(); }

document.getElementById('overlayInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveOverlay();
  if (e.key === 'Escape') closeOverlay();
});

// init
initGame();
render();
</script>
</body>
</html>
